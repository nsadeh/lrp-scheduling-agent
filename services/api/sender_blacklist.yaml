# Sender blacklist for the email classifier.
#
# Emails from these senders short-circuit the classifier: no LLM call, no
# row in agent_suggestions, no Langfuse trace. The check only applies to
# incoming emails on threads that are NOT linked to a scheduling loop —
# linked threads always get classified, in case a newsletter ever shows
# up inside an active candidate conversation.
#
# To add a sender, open a PR and edit this file. Audit production traffic
# via the Langfuse classify_email traces (filter classification=not_scheduling)
# to find new offenders.
#
# Domains and emails are matched case-insensitively against the bare
# address (the part Gmail parses out of the From header — see
# api.gmail.models.parse_email_address).
#
# Domain match: full-string equality on the domain portion (everything
# after the last "@"). Subdomains are NOT auto-matched — list each
# subdomain explicitly. This keeps false-positive risk near zero at the
# cost of more lines.

